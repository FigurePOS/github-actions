name: Terraform Plan
description: Plans the Terraform code

inputs:
  aws-account-id:
    required: true
  aws-region:
    required: false
    default: us-east-1
  dir:
    required: false
    default: tf
  env:
    required: true
  service-name:
    required: true

runs:
  using: composite
  steps:
    - id: sha_short
      shell: bash
      run: echo "sha_short=$(git rev-parse --short=8 ${{ github.sha }})" >> $GITHUB_OUTPUT

    - id: plan
      shell: bash
      working-directory: ${{ inputs.dir }}
      run: |-
        trap 'exit_code="$?"; echo "exit_code=$exit_code"; echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"; if [[ "$exit_code" == "2" ]]; then exit 0; fi' EXIT
        # Capture both stdout and stderr to tf.console.txt, ensuring errors are visible
        tofu plan -detailed-exitcode -out=tf.plan -lock=false -no-color 2>&1 | tee tf.console.txt
      env:
        TF_VAR_aws_account_id: "${{ inputs.aws-account-id }}"
        TF_VAR_aws_region: "${{ inputs.aws-region }}"
        TF_VAR_deployment_tag: "${{ steps.sha_short.outputs.sha_short }}"
        TF_VAR_env: "${{ inputs.env }}"
        TF_VAR_git_commit_hash: "${{ github.sha }}"
        TF_VAR_service_name: "${{ inputs.service-name }}"
    - if: failure()
      shell: bash
      working-directory: ${{ inputs.dir }}
      run: |
        echo "::error::OpenTofu plan failed"
        if [ -f tf.console.txt ]; then
          echo "::group::OpenTofu Plan Output"
          cat tf.console.txt
          echo "::endgroup::"
          # Also output the last 50 lines to make errors more visible
          echo "::group::Last 50 lines of output"
          tail -n 50 tf.console.txt
          echo "::endgroup::"
        else
          echo "::error::tf.console.txt was not created - this indicates a severe error"
        fi

    - id: show
      if: steps.plan.outputs.exit_code != '1'
      shell: bash
      working-directory: ${{ inputs.dir }}
      run: |
        if [ -f tf.plan ]; then
          tofu show tf.plan -no-color > tf.show.txt

          # Diff of changes from `tofu show` (human-readable plan).
          # Match two leading spaces before `#` (tabs/alignment differ across CLI versions).
          # Filter noisy dependency/unknown-value lines, then map to diff-style prefixes.
          build_diff_from_plan_text() {
            grep -E '^[[:space:]]{2}# ' "$1" | grep -Ev '^[[:space:]]{2}# .*(be read during apply|\(depends on a resource or a module with changes pending\)|\(config refers to values not yet known\))' | sed -e 's/^[[:space:]]\{2\}# \(.* be created\)/+ \1/' -e 's/^[[:space:]]\{2\}# \(.* be destroyed\)/- \1/' -e 's/^[[:space:]]\{2\}# \(.* be replaced\)/-\/+ \1/' -e 's/^[[:space:]]\{2\}# \(.* be updated\)/~ \1/' -e 's/^[[:space:]]\{2\}# \(.*\)/# \1/'
          }
          build_diff_from_plan_text tf.show.txt > tf.diff.txt || true
          # If show output format did not yield resource lines, fall back to stdout from `tofu plan`
          # (same "  # resource ... will be …" headers) so the PR summary is never empty when there are changes.
          if [[ ! -s tf.diff.txt ]] && [[ -f tf.console.txt ]]; then
            build_diff_from_plan_text tf.console.txt >> tf.diff.txt || true
          fi
        else
          echo "::warning::tf.plan file not found, skipping show step"
        fi

    - id: post
      if: always()
      shell: bash
      working-directory: ${{ inputs.dir }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Check if plan was successful or failed
        if [[ "${{ steps.plan.outputs.exit_code }}" == "1" ]]; then
          # Plan failed
          summary="Error: OpenTofu plan failed"
          if [[ -f tf.console.txt ]]; then
            # Full log for the details section
            console=$(head -c 42000 tf.console.txt | sed '${/^  /d}')
            
            # Extract errors for the main comment
            errors=$(sed -n '/Error:/,$p' tf.console.txt)
            if [[ -n "$errors" ]]; then
              error_details=$(echo "$errors" | head -c 24000)
            else
              error_details="Could not parse errors from the plan output."
            fi
            
            diff="
            ${summary}
            
          \`\`\`
          ${error_details}
          \`\`\`
          "
          else
            console="Error: OpenTofu plan failed but no output was captured"
            diff="
            ${summary}
            
          \`\`\`
          No output was captured.
          \`\`\`
          "
          fi
        else
          # Plan was successful or had changes - use normal processing
          if [[ -f tf.show.txt ]]; then
            # Parse the tf.show.txt file (detailed output from tofu show), truncated for character limit.
            # Fix: Use temp file to avoid broken pipe with head
            grep -v '\.\.\.$' tf.show.txt > tf.temp.txt
            console=$(head -c 42000 tf.temp.txt | sed '${/^  /d}')
          else
            console="No plan output available"
          fi

          # Last plan status line from console (stable; avoids scanning from EOF with tac).
          summary=$(grep -E '^(Plan:|No changes\.|Error:|Apply complete!|Success)' tf.console.txt 2>/dev/null | tail -n 1)
          if [[ -z "$summary" ]]; then
            summary="OpenTofu plan finished (see Detailed Plan below)."
          fi

          plan_exit="${{ steps.plan.outputs.exit_code }}"
          # If tf.diff.txt exists, display it within a diff block, truncated for character limit.
          if [[ -s tf.diff.txt ]]; then
            diff="
            ${summary}
            
          \`\`\`diff
          $(head -c 24000 tf.diff.txt)
          \`\`\`
          "
          elif [[ "$plan_exit" == "2" ]]; then
            # -detailed-exitcode 2 = changes present; do not claim "No changes." if compact diff is empty.
            diff="
            ${summary}

            \`\`\`diff
            # Compact resource list unavailable; expand Detailed Plan below.
            \`\`\`
            "
          else
            diff="
            ${summary}

            \`\`\`diff
            No changes.
            \`\`\`
            "
          fi
        fi

        # Set outputs for both success and failure cases
        { echo 'result<<EOTFVIAPR'
          echo "$console"
          echo EOTFVIAPR
        } >> "$GITHUB_OUTPUT"

        { echo 'summary<<EOTFVIAPR'
          echo "$summary"
          echo EOTFVIAPR
        } >> "$GITHUB_OUTPUT"

        if [[ -s tf.diff.txt ]]; then
          { echo 'diff<<EOTFVIAPR'
            head -c 24000 tf.diff.txt
            echo EOTFVIAPR
          } >> "$GITHUB_OUTPUT"
        fi

        body=$(cat <<EOTFVIAPR
        ### terraform plan for \`${{ inputs.env }}\`

        ${diff}
        <details><summary>Detailed Plan</br>

        </summary>

        \`\`\`hcl
        ${console}
        \`\`\`
        </details>
        <!-- pr-${{ github.event.pull_request.number }}-${{ inputs.env }} -->
        EOTFVIAPR
        )

        # Post output to job summary.
        echo "$body" >> $GITHUB_STEP_SUMMARY

        # Post PR comment per update and if the PR number is not 0.
        # Check if the PR contains a bot comment with the same identifier.
        if [[ "${{ github.event.pull_request.number }}" != "" && "${{ github.event.pull_request.number }}" != "0" ]]; then
          list_comments=$(gh api /repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --method GET --field per_page=100)
          bot_comment=$(echo "$list_comments" | jq -r --arg identifier "pr-${{ github.event.pull_request.number }}-${{ inputs.env }}" '.[] | select(.user.type == "Bot") | select(.body | contains($identifier)) | .id' | head -n 1)
          
          if [[ -n "$bot_comment" ]]; then
            # Update existing comment.
            pr_comment=$(gh api /repos/${{ github.repository }}/issues/comments/${bot_comment} --method PATCH --field "body=${body}")
            echo "comment_id=$(echo "$pr_comment" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          else
            # Post new comment.
            pr_comment=$(gh api /repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --method POST --field "body=${body}")
            echo "comment_id=$(echo "$pr_comment" | jq -r '.id')" >> "$GITHUB_OUTPUT"
          fi
        fi

        # Clean up files.
        rm -f tf.console.txt tf.show.txt tf.diff.txt tf.temp.txt tf.plan
